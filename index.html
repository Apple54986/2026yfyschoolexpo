<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>永豐餘挑戰賽</title>
    <style>
        :root {
            --energy-red: #FF0000;
            --deep-red: #8B0000;
            --charcoal: #121212;
            --tech-gray: #333333;
            --bright-orange: #FF8C00;
            --white: #FFFFFF;
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--charcoal);
            color: var(--white);
            overflow: hidden;
            user-select: none;
            touch-action: manipulation;
        }

        .bg-glow {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, var(--deep-red) 0%, var(--charcoal) 70%);
            z-index: -1;
            opacity: 0.6;
        }

        #game-container {
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            height: 100vh; width: 100vw;
            text-align: center;
            padding: 10px; box-sizing: border-box;
        }

        h1 { color: var(--energy-red); text-shadow: 0 0 10px rgba(255,0,0,0.7); margin-bottom: 5px; }
        .score-board { font-size: 1.1rem; color: var(--bright-orange); margin-bottom: 10px; font-weight: bold; }

        .btn-red {
            background: linear-gradient(45deg, var(--deep-red), var(--energy-red));
            color: white; border: 1px solid rgba(255,255,255,0.3);
            padding: 15px 30px; font-size: 1.2rem; font-weight: bold;
            border-radius: 10px; cursor: pointer;
            box-shadow: 0 0 10px rgba(255,0,0,0.5);
            text-decoration: none; display: inline-block;
        }

        .level-screen { display: none; width: 100%; height: 100%; flex-direction: column; align-items: center; justify-content: center; }
        .active { display: flex; }

        #game-canvas { border: 2px solid var(--energy-red); background: rgba(0,0,0,0.5); max-width: 100%; touch-action: none; height: 400px; }

        .timer-bar-bg { width: 80%; height: 10px; background: #222; border-radius: 5px; margin: 10px 0 20px 0; overflow: hidden; }
        #timer-fill { width: 100%; height: 100%; background: var(--energy-red); }

        /* 反饋文字 */
        .feedback { font-size: 1.3rem; font-weight: bold; margin-top: 15px; min-height: 2.5rem; padding: 0 10px; line-height: 1.4; }
        .correct { color: #28a745; }
        .wrong { color: var(--energy-red); }
        .lv-clear { font-size: 2rem; color: var(--bright-orange); text-shadow: 0 0 15px var(--energy-red); animation: pulse 0.5s infinite alternate; }

        @keyframes pulse { from { transform: scale(1); } to { transform: scale(1.1); } }

        .biz-card { font-size: 1.4rem; font-weight: bold; margin: 15px 0; min-height: 3rem; color: white; display: flex; align-items: center; justify-content: center; }
        .binary-choice { display: flex; gap: 20px; width: 100%; justify-content: center; }
        .choice-container { display: flex; flex-direction: column; gap: 12px; width: 100%; max-width: 300px; }
    </style>
</head>
<body>

    <div class="bg-glow"></div>
    <div id="game-container">
        
        <!-- 進入頁 -->
        <div id="screen-start" class="level-screen active">
            <h1>永豐餘挑戰賽</h1>
            <p>2分鐘挑戰</p>
            <button class="btn-red" onclick="startGame()">[ 立即啟動 ]</button>
        </div>

        <!-- 第一關：10秒捕獲 -->
        <div id="screen-lv1" class="level-screen">
            <h2>第一關：醣源啟動</h2>
            <div class="score-board">剩餘時間: <span id="lv1-timer">10</span>s</div>
            <canvas id="game-canvas"></canvas>
            <div id="lv1-result-display" class="feedback"></div>
            <p style="font-size: 1.4rem; font-weight: bold; margin-top: 10px;">目前積分: <span id="score1" style="color:var(--energy-red)">0</span> / 10</p>
        </div>

        <!-- 第二關：事業項目 -->
        <div id="screen-lv2" class="level-screen">
            <h2>第二關：永豐餘事業項目</h2>
            <p>請問這是永豐餘的事業項目嗎？</p>
            <div class="timer-bar-bg"><div id="timer-fill"></div></div>
            <div id="biz-item-text" class="biz-card">載入中...</div>
            <div class="binary-choice" id="lv2-btns">
                <button class="btn-red" onclick="handleBinary(true)">是</button>
                <button class="btn-red" onclick="handleBinary(false)">不是</button>
            </div>
            <div id="lv2-feedback" class="feedback"></div>
        </div>

        <!-- 第三關：AI 決策選擇題 -->
        <div id="screen-lv3" class="level-screen">
            <h2>第三關：快問快答</h2>
            <div id="quiz-question" class="biz-card" style="font-size:1.1rem; padding: 0 10px;">讀取中...</div>
            <div class="choice-container" id="quiz-options"></div>
            <div id="lv3-feedback" class="feedback"></div>
        </div>

        <!-- 結束頁 -->
        <div id="screen-result" class="level-screen">
            <h1 style="color:var(--bright-orange)">MISSION COMPLETE</h1>
            <div style="font-size: 2rem; margin: 20px 0;">最終總分：<span id="total-score" style="color:var(--energy-red)">0</span></div>
            <p id="ui-result-text">感謝參與！點擊下方填寫問卷領取獎勵。</p>
            <button class="btn-red" onclick="goToSurvey()">[ 填寫問卷領取獎勵 ]</button>
        </div>

    </div>

    <script>
        const GAME_CONFIG = {
            surveyUrl: "https://www.surveycake.com/s/OYYdG",
            binaryQuiz: [
                { text: "五月花衛生紙", isTrue: true, correctAns: "是" },
                { text: "只有傳統造紙", isTrue: false, correctAns: "不是" },
                { text: "永續能源發電", isTrue: true, correctAns: "是" }
            ],
            quiz: [
                {
                    question: "永豐餘綠色發電，主要包含以下何者？",
                    options: [
                        { text: "沼氣發電", correct: true },
                        { text: "核能發電", correct: false },
                        { text: "火力發電", correct: false }
                    ],
                    correctAns: "沼氣發電"
                },
                {
                    question: "永續發展中，最重要的核心是什麼？",
                    options: [
                        { text: "持續增加碳排放", correct: false },
                        { text: "企業快速成長獲利", correct: false },
                        { text: "循環經濟型與社會責任", correct: true }
                    ],
                    correctAns: "循環經濟與社會責任"
                }
            ]
        };

        let totalScore = 0;
        let lv1Score = 0;
        let currentIdx = 0;
        let timerInterval;
        let isLv1Running = false;

        function showScreen(id) {
            document.querySelectorAll('.level-screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        function startGame() {
            showScreen('screen-lv1');
            initLv1();
        }

        function goToSurvey() {
            window.location.href = GAME_CONFIG.surveyUrl;
        }

        // --- 第一關：醣源啟動 ---
        function initLv1() {
            const canvas = document.getElementById('game-canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = window.innerWidth * 0.9;
            canvas.height = 400; 
            
            let playerX = canvas.width / 2;
            let items = [];
            let timeLeft = 10;
            isLv1Running = true;
            lv1Score = 0;

            const moveHandler = (e) => {
                const rect = canvas.getBoundingClientRect();
                const clientX = e.touches ? e.touches[0].clientX : e.clientX;
                playerX = clientX - rect.left;
                if (playerX < 30) playerX = 30;
                if (playerX > canvas.width - 30) playerX = canvas.width - 30;
            };
            canvas.addEventListener('touchmove', moveHandler);
            canvas.addEventListener('mousemove', moveHandler);

            const lv1Timer = setInterval(() => {
                timeLeft--;
                document.getElementById('lv1-timer').innerText = timeLeft;
                if(timeLeft <= 0 || !isLv1Running) {
                    endLevel1(lv1Timer);
                }
            }, 1000);

            function endLevel1(timer) {
                clearInterval(timer);
                isLv1Running = false;
                const finalScore = Math.max(0, Math.min(lv1Score, 10));
                totalScore += finalScore;
                
                const resultDisplay = document.getElementById('lv1-result-display');
                resultDisplay.innerHTML = `<span class="lv-clear">第一關得分：${finalScore} 分</span>`;
                
                setTimeout(() => {
                    resultDisplay.innerHTML = "";
                    currentIdx = 0;
                    showScreen('screen-lv2');
                    initLv2();
                }, 1500);
            }

            function update() {
                if(!isLv1Running) return;
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                
                ctx.fillStyle = '#FF0000';
                ctx.fillRect(playerX - 35, canvas.height - 25, 70, 15);

                if(Math.random() < 0.12) {
                    const type = Math.random() > 0.3 ? 'red' : 'gray';
                    items.push({ x: Math.random() * canvas.width, y: 0, type: type });
                }

                items.forEach((item, index) => {
                    item.y += 3.2; 
                    ctx.fillStyle = item.type === 'red' ? '#FF0000' : '#888888';
                    ctx.beginPath(); ctx.arc(item.x, item.y, 12, 0, Math.PI*2); ctx.fill();

                    if(item.y > canvas.height - 40 && Math.abs(item.x - playerX) < 40) {
                        if(item.type === 'red') {
                            lv1Score++;
                        } else {
                            lv1Score = Math.max(0, lv1Score - 1);
                        }
                        document.getElementById('score1').innerText = lv1Score;
                        items.splice(index, 1);
                        if(lv1Score >= 10) isLv1Running = false;
                    }
                    if(item.y > canvas.height) items.splice(index, 1);
                });
                requestAnimationFrame(update);
            }
            update();
        }

        // --- 第二關：是非題 ---
        function initLv2() {
            if (currentIdx >= GAME_CONFIG.binaryQuiz.length) {
                currentIdx = 0;
                showScreen('screen-lv3');
                initLv3();
                return;
            }

            const q = GAME_CONFIG.binaryQuiz[currentIdx];
            document.getElementById('biz-item-text').innerText = q.text;
            document.getElementById('lv2-feedback').innerText = "";
            document.getElementById('lv2-btns').style.pointerEvents = "auto";
            
            let timeLeft = 3.0;
            document.getElementById('timer-fill').style.width = '100%';
            
            clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                timeLeft -= 0.1;
                document.getElementById('timer-fill').style.width = (timeLeft / 3.0 * 100) + '%';
                if (timeLeft <= 0) handleBinary(null); 
            }, 100);
        }

        function handleBinary(userChoice) {
            clearInterval(timerInterval);
            document.getElementById('lv2-btns').style.pointerEvents = "none";
            const q = GAME_CONFIG.binaryQuiz[currentIdx];
            const feedbackEl = document.getElementById('lv2-feedback');

            if (userChoice === null) {
                feedbackEl.innerText = "時間到囉！正確答案是「" + q.correctAns + "」";
                feedbackEl.className = "feedback wrong";
            } else if (userChoice === q.isTrue) {
                totalScore++;
                feedbackEl.innerText = "恭喜答對~";
                feedbackEl.className = "feedback correct";
            } else {
                feedbackEl.innerText = "答錯囉！正確答案是「" + q.correctAns + "」";
                feedbackEl.className = "feedback wrong";
            }

            setTimeout(() => {
                currentIdx++;
                initLv2();
            }, 2000);
        }

        // --- 第三關：選擇題 ---
        function initLv3() {
            if (currentIdx >= GAME_CONFIG.quiz.length) {
                document.getElementById('total-score').innerText = totalScore;
                showScreen('screen-result');
                return;
            }

            const q = GAME_CONFIG.quiz[currentIdx];
            document.getElementById('quiz-question').innerText = q.question;
            document.getElementById('lv3-feedback').innerText = "";
            const container = document.getElementById('quiz-options');
            container.innerHTML = '';
            
            q.options.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = 'btn-red';
                btn.innerText = opt.text;
                btn.onclick = () => {
                    container.style.pointerEvents = "none";
                    const feedbackEl = document.getElementById('lv3-feedback');
                    if(opt.correct) {
                        totalScore++;
                        feedbackEl.innerText = "恭喜答對~";
                        feedbackEl.className = "feedback correct";
                    } else {
                        feedbackEl.innerText = "答錯囉！正確答案是「" + q.correctAns + "」";
                        feedbackEl.className = "feedback wrong";
                    }
                    setTimeout(() => {
                        currentIdx++;
                        initLv3();
                        container.style.pointerEvents = "auto";
                    }, 2000);
                };
                container.appendChild(btn);
            });
        }
    </script>
</body>
</html>
