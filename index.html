<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>永豐餘挑戰賽</title>
    <style>
        :root {
            --energy-red: #FF0000;
            --deep-red: #8B0000;
            --charcoal: #121212;
            --tech-gray: #333333;
            --bright-orange: #FF8C00;
            --white: #FFFFFF;
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--charcoal);
            color: var(--white);
            overflow: hidden;
            user-select: none;
            touch-action: none; /* 全域禁止縮放與手勢以提升遊戲反應 */
        }

        .bg-glow {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, var(--deep-red) 0%, var(--charcoal) 70%);
            z-index: -1;
            opacity: 0.6;
        }

        #game-container {
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            height: 100vh; width: 100vw;
            text-align: center;
            padding: 10px; box-sizing: border-box;
        }

        h1 { color: var(--energy-red); text-shadow: 0 0 15px rgba(255,0,0,0.8); margin-bottom: 5px; font-size: 1.8rem; }
        .score-board { font-size: 1.1rem; color: var(--bright-orange); margin-bottom: 10px; font-weight: bold; }

        .btn-red {
            background: linear-gradient(45deg, var(--deep-red), var(--energy-red));
            color: white; border: 1px solid rgba(255,255,255,0.3);
            padding: 15px 35px; font-size: 1.2rem; font-weight: bold;
            border-radius: 12px; cursor: pointer;
            box-shadow: 0 0 15px rgba(255,0,0,0.4);
            transition: transform 0.1s;
            text-decoration: none; display: inline-block;
        }
        .btn-red:active { transform: scale(0.95); }

        .level-screen { 
            display: none; width: 100%; height: 100%; 
            flex-direction: column; align-items: center; justify-content: center;
            animation: fadeIn 0.4s ease-out;
        }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .active { display: flex; }

        #game-canvas { 
            border: 2px solid var(--energy-red); 
            background: rgba(0,0,0,0.6); 
            max-width: 95%; 
            height: 420px; 
            border-radius: 8px;
            box-shadow: 0 0 20px rgba(255,0,0,0.2);
        }

        .timer-bar-bg { width: 85%; height: 12px; background: #222; border-radius: 6px; margin: 15px 0 25px 0; overflow: hidden; border: 1px solid var(--tech-gray); }
        #timer-fill { width: 100%; height: 100%; background: var(--energy-red); box-shadow: 0 0 10px var(--energy-red); }

        .feedback { font-size: 1.3rem; font-weight: bold; margin-top: 15px; min-height: 3rem; padding: 0 15px; line-height: 1.4; transition: all 0.2s; }
        .correct { color: #28a745; text-shadow: 0 0 10px rgba(40,167,69,0.5); }
        .wrong { color: var(--energy-red); text-shadow: 0 0 10px rgba(255,0,0,0.5); }
        
        .lv-clear-pop { 
            font-size: 2.2rem; color: var(--bright-orange); 
            text-shadow: 0 0 20px var(--energy-red); 
            animation: scorePop 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
        }
        @keyframes scorePop { from { transform: scale(0.5); opacity: 0; } to { transform: scale(1); opacity: 1; } }

        .biz-card { font-size: 1.5rem; font-weight: bold; margin: 20px 0; min-height: 3.5rem; color: white; display: flex; align-items: center; justify-content: center; }
        .binary-choice { display: flex; gap: 20px; width: 100%; justify-content: center; }
        .choice-container { display: flex; flex-direction: column; gap: 12px; width: 100%; max-width: 300px; }
    </style>
</head>
<body>

    <div class="bg-glow"></div>
    <div id="game-container">
        
        <!-- 進入頁 -->
        <div id="screen-start" class="level-screen active">
            <h1>永豐餘挑戰賽</h1>
            <p style="letter-spacing: 2px;">2分鐘挑戰</p>
            <br>
            <button class="btn-red" onclick="startGame()">[ 立即啟動 ]</button>
        </div>

        <!-- 第一關：10秒捕獲 -->
        <div id="screen-lv1" class="level-screen">
            <h2 style="margin-bottom: 5px;">第一關：醣源啟動</h2>
            <div class="score-board">剩餘時間: <span id="lv1-timer">10</span>s</div>
            <canvas id="game-canvas"></canvas>
            <div id="lv1-result-display" class="feedback"></div>
            <!-- 原本此處的目前積分/10已移除，保持畫面乾淨 -->
        </div>

        <!-- 第二關：事業項目 -->
        <div id="screen-lv2" class="level-screen">
            <h2>第二關：事業項目</h2>
            <p>這項是永豐餘的事業項目嗎？</p>
            <div class="timer-bar-bg"><div id="timer-fill"></div></div>
            <div id="biz-item-text" class="biz-card">載入中...</div>
            <div class="binary-choice" id="lv2-btns">
                <button class="btn-red" onclick="handleBinary(true)">是</button>
                <button class="btn-red" onclick="handleBinary(false)">不是</button>
            </div>
            <div id="lv2-feedback" class="feedback"></div>
        </div>

        <!-- 第三關：快問快答 -->
        <div id="screen-lv3" class="level-screen">
            <h2>第三關：快問快答</h2>
            <div id="quiz-question" class="biz-card" style="font-size:1.15rem; padding: 0 15px;">讀取中...</div>
            <div class="choice-container" id="quiz-options"></div>
            <div id="lv3-feedback" class="feedback"></div>
        </div>

        <!-- 結束頁 -->
        <div id="screen-result" class="level-screen">
            <h1 style="color:var(--bright-orange)">MISSION COMPLETE</h1>
            <div style="font-size: 2.2rem; margin: 25px 0; font-weight: 800;">最終總分：<span id="total-score" style="color:var(--energy-red)">0</span></div>
            <p id="ui-result-text">感謝參與！點擊下方填寫問卷領取獎勵。</p>
            <br>
            <button class="btn-red" onclick="goToSurvey()">[ 填寫問卷領取獎勵 ]</button>
        </div>

    </div>

    <script>
        const GAME_CONFIG = {
            surveyUrl: "https://www.surveycake.com/s/OYYdG",
            binaryQuiz: [
                { text: "五月花衛生紙", isTrue: true, correctAns: "是" },
                { text: "只有傳統造紙", isTrue: false, correctAns: "不是" },
                { text: "永續能源發電", isTrue: true, correctAns: "是" }
            ],
            quiz: [
                {
                    question: "永豐餘綠色發電，主要包含以下何者？",
                    options: [
                        { text: "沼氣發電", correct: true },
                        { text: "核能發電", correct: false },
                        { text: "火力發電", correct: false }
                    ],
                    correctAns: "沼氣發電"
                },
                {
                    question: "永續發展中，最重要的核心是什麼？",
                    options: [
                        { text: "持續增加碳排放", correct: false },
                        { text: "企業快速成長獲利", correct: false },
                        { text: "循環經濟與社會責任", correct: true }
                    ],
                    correctAns: "循環經濟與社會責任"
                }
            ]
        };

        let totalScore = 0;
        let lv1Score = 0;
        let currentIdx = 0;
        let timerInterval;
        let isLv1Running = false;

        function showScreen(id) {
            document.querySelectorAll('.level-screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        function startGame() {
            showScreen('screen-lv1');
            initLv1();
        }

        function goToSurvey() {
            window.location.href = GAME_CONFIG.surveyUrl;
        }

        // --- 第一關：醣源啟動 (優化版) ---
        function initLv1() {
            const canvas = document.getElementById('game-canvas');
            const ctx = canvas.getContext('2d');
            const dpr = window.devicePixelRatio || 1;
            const rect = canvas.getBoundingClientRect();
            
            canvas.width = rect.width * dpr;
            canvas.height = 420 * dpr;
            ctx.scale(dpr, dpr);
            
            const logicalWidth = rect.width;
            const logicalHeight = 420;
            
            let playerX = logicalWidth / 2;
            let targetX = playerX;
            let items = [];
            let timeLeft = 10;
            let pulseTime = 0;
            isLv1Running = true;
            lv1Score = 0;

            // 提升觸控流暢度
            const updatePos = (e) => {
                const clientX = e.touches ? e.touches[0].clientX : e.clientX;
                targetX = clientX - canvas.getBoundingClientRect().left;
            };
            canvas.addEventListener('touchmove', (e) => { e.preventDefault(); updatePos(e); }, {passive: false});
            canvas.addEventListener('mousemove', updatePos);

            const lv1Timer = setInterval(() => {
                timeLeft--;
                document.getElementById('lv1-timer').innerText = timeLeft;
                if(timeLeft <= 0 || !isLv1Running) {
                    endLevel1(lv1Timer);
                }
            }, 1000);

            function endLevel1(timer) {
                clearInterval(timer);
                isLv1Running = false;
                const finalScore = Math.max(0, Math.min(lv1Score, 10));
                totalScore += finalScore;
                
                const resultDisplay = document.getElementById('lv1-result-display');
                resultDisplay.innerHTML = `<span class="lv-clear-pop">第一關得分：${finalScore} 分</span>`;
                
                setTimeout(() => {
                    resultDisplay.innerHTML = "";
                    currentIdx = 0;
                    showScreen('screen-lv2');
                    initLv2();
                }, 1800);
            }

            function update() {
                if(!isLv1Running) return;
                ctx.clearRect(0, 0, logicalWidth, logicalHeight);
                
                // 緩動插值讓移動更順滑
                playerX += (targetX - playerX) * 0.25;
                if (playerX < 35) playerX = 35;
                if (playerX > logicalWidth - 35) playerX = logicalWidth - 35;

                // 畫玩家 (帶發光效果)
                ctx.shadowBlur = pulseTime > 0 ? 20 : 5;
                ctx.shadowColor = 'red';
                ctx.fillStyle = pulseTime > 0 ? '#FF5555' : '#FF0000';
                ctx.fillRect(playerX - 35, logicalHeight - 30, 70, 15);
                ctx.shadowBlur = 0;
                if(pulseTime > 0) pulseTime--;

                // 球體生成
                if(Math.random() < 0.13) {
                    const type = Math.random() > 0.35 ? 'red' : 'gray';
                    items.push({ x: Math.random() * logicalWidth, y: -20, type: type });
                }

                items.forEach((item, index) => {
                    item.y += 3.5; 
                    ctx.fillStyle = item.type === 'red' ? '#FF0000' : '#888888';
                    ctx.beginPath(); 
                    ctx.arc(item.x, item.y, 13, 0, Math.PI*2); 
                    ctx.fill();

                    // 碰撞
                    if(item.y > logicalHeight - 45 && Math.abs(item.x - playerX) < 45) {
                        if(item.type === 'red') {
                            lv1Score++;
                            pulseTime = 5; // 接到紅球時核心閃爍
                        } else {
                            lv1Score = Math.max(0, lv1Score - 1);
                        }
                        items.splice(index, 1);
                        if(lv1Score >= 10) isLv1Running = false;
                    }
                    if(item.y > logicalHeight) items.splice(index, 1);
                });
                requestAnimationFrame(update);
            }
            update();
        }

        // --- 第二關：是非題 (4秒版) ---
        function initLv2() {
            if (currentIdx >= GAME_CONFIG.binaryQuiz.length) {
                currentIdx = 0;
                showScreen('screen-lv3');
                initLv3();
                return;
            }

            const q = GAME_CONFIG.binaryQuiz[currentIdx];
            document.getElementById('biz-item-text').innerText = q.text;
            document.getElementById('lv2-feedback').innerText = "";
            document.getElementById('lv2-btns').style.pointerEvents = "auto";
            
            let timeLeft = 4.0; // 延長至4秒
            document.getElementById('timer-fill').style.width = '100%';
            
            clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                timeLeft -= 0.05;
                document.getElementById('timer-fill').style.width = (timeLeft / 4.0 * 100) + '%';
                if (timeLeft <= 0) handleBinary(null); 
            }, 5000/100); // 平滑進度條
        }

        function handleBinary(userChoice) {
            clearInterval(timerInterval);
            document.getElementById('lv2-btns').style.pointerEvents = "none";
            const q = GAME_CONFIG.binaryQuiz[currentIdx];
            const feedbackEl = document.getElementById('lv2-feedback');

            if (userChoice === null) {
                feedbackEl.innerText = "時間到囉！答案是「" + q.correctAns + "」";
                feedbackEl.className = "feedback wrong";
            } else if (userChoice === q.isTrue) {
                totalScore++;
                feedbackEl.innerText = "恭喜答對~";
                feedbackEl.className = "feedback correct";
            } else {
                feedbackEl.innerText = "答錯囉！答案是「" + q.correctAns + "」";
                feedbackEl.className = "feedback wrong";
            }

            setTimeout(() => {
                currentIdx++;
                initLv2();
            }, 1800);
        }

        // --- 第三關：選擇題 ---
        function initLv3() {
            if (currentIdx >= GAME_CONFIG.quiz.length) {
                document.getElementById('total-score').innerText = totalScore;
                showScreen('screen-result');
                return;
            }

            const q = GAME_CONFIG.quiz[currentIdx];
            document.getElementById('quiz-question').innerText = q.question;
            document.getElementById('lv3-feedback').innerText = "";
            const container = document.getElementById('quiz-options');
            container.innerHTML = '';
            
            q.options.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = 'btn-red';
                btn.innerText = opt.text;
                btn.onclick = () => {
                    container.style.pointerEvents = "none";
                    const feedbackEl = document.getElementById('lv3-feedback');
                    if(opt.correct) {
                        totalScore++;
                        feedbackEl.innerText = "恭喜答對~";
                        feedbackEl.className = "feedback correct";
                    } else {
                        feedbackEl.innerText = "答錯囉！答案是「" + q.correctAns + "」";
                        feedbackEl.className = "feedback wrong";
                    }
                    setTimeout(() => {
                        currentIdx++;
                        initLv3();
                        container.style.pointerEvents = "auto";
                    }, 1800);
                };
                container.appendChild(btn);
            });
        }
    </script>
</body>
</html>
