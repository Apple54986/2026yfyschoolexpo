<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>永豐餘挑戰賽</title>
    <style>
        :root {
            --energy-red: #FF0000;
            --deep-red: #8B0000;
            --charcoal: #121212;
            --tech-gray: #333333;
            --bright-orange: #FF8C00;
            --white: #FFFFFF;
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--charcoal);
            color: var(--white);
            overflow: hidden;
            user-select: none;
            touch-action: manipulation; /* 優化移動端點擊 */
        }

        /* 背景流體動畫效果 */
        .bg-glow {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, var(--deep-red) 0%, var(--charcoal) 70%);
            z-index: -1;
            opacity: 0.6;
        }

        /* 遊戲容器 */
        #game-container {
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            height: 100vh; width: 100vw;
            text-align: center;
            padding: 20px; box-sizing: border-box;
        }

        /* 標題與文字 */
        h1 { color: var(--energy-red); text-shadow: 0 0 10px rgba(255,0,0,0.7); margin-bottom: 10px; }
        p { font-size: 1.1rem; line-height: 1.5; margin-bottom: 20px; }

        /* 按鈕設計 */
        .btn-action {
            background: linear-gradient(45deg, var(--deep-red), var(--energy-red));
            color: white; border: none;
            padding: 15px 40px; font-size: 1.2rem; font-weight: bold;
            border-radius: 50px; cursor: pointer;
            box-shadow: 0 0 15px var(--energy-red);
            transition: transform 0.2s, box-shadow 0.2s;
            animation: breathe 2s infinite;
            text-decoration: none;
            display: inline-block;
        }
        @keyframes breathe {
            0% { box-shadow: 0 0 5px var(--energy-red); }
            50% { box-shadow: 0 0 20px var(--energy-red); }
            100% { box-shadow: 0 0 5px var(--energy-red); }
        }

        /* 關卡顯示區 */
        .level-screen { display: none; width: 100%; height: 100%; flex-direction: column; align-items: center; justify-content: center; }
        .active { display: flex; }

        /* 第一關：掉落物遊戲區 */
        #game-canvas { border: 2px solid var(--energy-red); background: rgba(0,0,0,0.5); max-width: 100%; }

        /* 第二關：能量條 */
        .energy-bar-bg { width: 80%; height: 30px; background: #222; border-radius: 15px; overflow: hidden; margin: 20px 0; border: 1px solid var(--tech-gray); }
        #energy-fill { width: 0%; height: 100%; background: var(--energy-red); box-shadow: 0 0 10px var(--energy-red); transition: width 0.1s; }

        /* 第三關：決策按鈕 */
        .choice-container { display: flex; flex-direction: column; gap: 15px; width: 100%; max-width: 300px; }
        .choice-btn { background: var(--tech-gray); border: 1px solid var(--energy-red); color: white; padding: 15px; border-radius: 10px; font-size: 1rem; cursor: pointer; }
        .choice-btn:active { background: var(--energy-red); }
    </style>
</head>
<body>

    <div class="bg-glow"></div>
    <div id="game-container">
        
        <!-- 進入頁 -->
        <div id="screen-start" class="level-screen active">
            <h1 id="ui-title">RED TECH</h1>
            <p id="ui-intro">載入中...</p>
            <button class="btn-action" onclick="startGame()">[ 立即啟動未來 ]</button>
        </div>

        <!-- 第一關：醣源啟動 -->
        <div id="screen-lv1" class="level-screen">
            <h2>第一關：醣源啟動</h2>
            <p>移動底端核心收集 <span style="color:var(--energy-red)">紅色醣分子</span></p>
            <canvas id="game-canvas"></canvas>
            <p>分數: <span id="score1">0</span> / 10</p>
        </div>

        <!-- 第二關：紅能發電 -->
        <div id="screen-lv2" class="level-screen">
            <h2>第二關：紅能發電</h2>
            <p>快速點擊按鈕產生紅色脈衝！</p>
            <div class="energy-bar-bg"><div id="energy-fill"></div></div>
            <button class="btn-action" style="animation:none; width:120px; height:120px; border-radius:60px;" onclick="chargeEnergy()">PUSH</button>
        </div>

        <!-- 第三關：AI 紅色大腦 -->
        <div id="screen-lv3" class="level-screen">
            <h2>第三關：AI 紅色決策</h2>
            <p id="quiz-question">讀取中...</p>
            <div class="choice-container" id="quiz-options"></div>
        </div>

        <!-- 結束頁 -->
        <div id="screen-result" class="level-screen">
            <h1 style="color:var(--bright-orange)">MISSION COMPLETE</h1>
            <p id="ui-result-text">你的轉型能量值破表！<br>獲得『紅色先鋒』稱號。</p>
            <button class="btn-action" onclick="goToSurvey()">[ 填寫問卷領取獎勵 ]</button>
        </div>

    </div>

    <script>
        /************************************************
         * 設定區
         ************************************************/
        const GAME_CONFIG = {
            intro: "2分鐘挑戰 AI 永續之王。",
            surveyUrl: "https://www.surveycake.com/s/OYYdG",
            quiz: [
                {
                    question: "永豐餘綠色發電，請問是以下何者？",
                    options: [
                        { text: "沼氣發電", correct: true },
                        { text: "水力發電", correct: false }, 
                        { text: "風力發電", correct: false }
                    ]
                },
                {
                    question: "ESG 永續發展中，最重要的核心是什麼？",
                    options: [
                        { text: "持續獲利", correct: false },
                        { text: "低碳轉型與社會責任", correct: true }
                    ]
                }
            ]
        };

        let energy = 0;
        let currentQuizIdx = 0;
        let isGameRunning = false;

        document.getElementById('ui-intro').innerHTML = GAME_CONFIG.intro;

        function showScreen(id) {
            document.querySelectorAll('.level-screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        function startGame() {
            showScreen('screen-lv1');
            initLv1();
        }

        function goToSurvey() {
            window.location.href = GAME_CONFIG.surveyUrl;
        }

        // --- 第一關邏輯 ---
        function initLv1() {
            const canvas = document.getElementById('game-canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = window.innerWidth * 0.8;
            canvas.height = 300;
            let playerX = canvas.width / 2;
            let items = [];
            let lv1Score = 0;
            isGameRunning = true;

            // 支援滑鼠與觸控
            const moveHandler = (e) => {
                const rect = canvas.getBoundingClientRect();
                const clientX = e.touches ? e.touches[0].clientX : e.clientX;
                playerX = clientX - rect.left;
            };
            canvas.addEventListener('touchmove', moveHandler);
            canvas.addEventListener('mousemove', moveHandler);

            function update() {
                if(!isGameRunning) return;
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                
                // 畫玩家
                ctx.fillStyle = '#FF0000';
                ctx.fillRect(playerX - 25, canvas.height - 20, 50, 10);

                if(Math.random() < 0.05) {
                    items.push({ x: Math.random() * canvas.width, y: 0, type: Math.random() > 0.3 ? 'red' : 'gray' });
                }

                items.forEach((item, index) => {
                    item.y += 4;
                    ctx.fillStyle = item.type === 'red' ? '#FF0000' : '#666';
                    ctx.beginPath();
                    ctx.arc(item.x, item.y, 10, 0, Math.PI*2);
                    ctx.fill();

                    if(item.y > canvas.height - 25 && Math.abs(item.x - playerX) < 30) {
                        if(item.type === 'red') {
                            lv1Score++;
                            document.getElementById('score1').innerText = lv1Score;
                        }
                        items.splice(index, 1);
                    }
                    if(item.y > canvas.height) items.splice(index, 1);
                });

                if(lv1Score >= 10) {
                    isGameRunning = false;
                    showScreen('screen-lv2');
                } else {
                    requestAnimationFrame(update);
                }
            }
            update();
        }

        // --- 第二關邏輯 ---
        function chargeEnergy() {
            energy += 10;
            if(energy > 100) energy = 100;
            document.getElementById('energy-fill').style.width = energy + '%';
            if(energy >= 100) {
                setTimeout(() => {
                    showScreen('screen-lv3');
                    initLv3();
                }, 300);
            }
        }

        // --- 第三關邏輯 ---
        function initLv3() {
            const q = GAME_CONFIG.quiz[currentQuizIdx];
            document.getElementById('quiz-question').innerText = q.question;
            const container = document.getElementById('quiz-options');
            container.innerHTML = '';
            
            q.options.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = 'choice-btn';
                btn.innerText = opt.text;
                btn.onclick = () => {
                    if(opt.correct) {
                        currentQuizIdx++;
                        if(currentQuizIdx >= GAME_CONFIG.quiz.length) {
                            showScreen('screen-result');
                        } else {
                            initLv3();
                        }
                    } else {
                        alert("再思考看看最好的轉型方案！");
                    }
                };
                container.appendChild(btn);
            });
        }
    </script>
</body>
</html>
