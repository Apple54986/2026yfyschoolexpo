<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>永豐餘挑戰賽</title>
    <style>
        :root {
            --energy-red: #FF0000;
            --deep-red: #8B0000;
            --charcoal: #121212;
            --tech-gray: #333333;
            --bright-orange: #FF8C00;
            --white: #FFFFFF;
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--charcoal);
            color: var(--white);
            overflow: hidden;
            user-select: none;
            touch-action: manipulation;
        }

        .bg-glow {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, var(--deep-red) 0%, var(--charcoal) 70%);
            z-index: -1;
            opacity: 0.6;
        }

        #game-container {
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            height: 100vh; width: 100vw;
            text-align: center;
            padding: 20px; box-sizing: border-box;
        }

        h1 { color: var(--energy-red); text-shadow: 0 0 10px rgba(255,0,0,0.7); margin-bottom: 10px; }
        p { font-size: 1.1rem; line-height: 1.5; margin-bottom: 20px; }

        .btn-action {
            background: linear-gradient(45deg, var(--deep-red), var(--energy-red));
            color: white; border: none;
            padding: 15px 40px; font-size: 1.2rem; font-weight: bold;
            border-radius: 50px; cursor: pointer;
            box-shadow: 0 0 15px var(--energy-red);
            transition: transform 0.2s;
            animation: breathe 2s infinite;
            text-decoration: none;
            display: inline-block;
        }
        @keyframes breathe {
            0% { box-shadow: 0 0 5px var(--energy-red); }
            50% { box-shadow: 0 0 20px var(--energy-red); }
            100% { box-shadow: 0 0 5px var(--energy-red); }
        }

        .level-screen { display: none; width: 100%; height: 100%; flex-direction: column; align-items: center; justify-content: center; }
        .active { display: flex; }

        #game-canvas { border: 2px solid var(--energy-red); background: rgba(0,0,0,0.5); max-width: 100%; }

        /* 第二關是非題樣式 */
        .timer-bar-bg { width: 80%; height: 10px; background: #222; border-radius: 5px; margin-bottom: 20px; overflow: hidden; }
        #timer-fill { width: 100%; height: 100%; background: var(--energy-red); transition: width 0.1s linear; }
        .biz-card { font-size: 1.8rem; font-weight: bold; color: var(--bright-orange); margin: 20px 0; min-height: 2.5rem; }
        .binary-choice { display: flex; gap: 20px; width: 100%; justify-content: center; }
        .btn-yes { background: #28a745; color: white; border: none; padding: 15px 40px; border-radius: 10px; font-size: 1.2rem; font-weight: bold; }
        .btn-no { background: #dc3545; color: white; border: none; padding: 15px 40px; border-radius: 10px; font-size: 1.2rem; font-weight: bold; }

        /* 第三關問答樣式 */
        .choice-container { display: flex; flex-direction: column; gap: 15px; width: 100%; max-width: 300px; }
        .choice-btn { background: var(--tech-gray); border: 1px solid var(--energy-red); color: white; padding: 15px; border-radius: 10px; font-size: 1rem; cursor: pointer; }
        .choice-btn:active { background: var(--energy-red); }
    </style>
</head>
<body>

    <div class="bg-glow"></div>
    <div id="game-container">
        
        <!-- 進入頁 -->
        <div id="screen-start" class="level-screen active">
            <h1 id="ui-title">RED TECH</h1>
            <p id="ui-intro">載入中...</p>
            <button class="btn-action" onclick="startGame()">[ 立即啟動未來 ]</button>
        </div>

        <!-- 第一關：醣源啟動 -->
        <div id="screen-lv1" class="level-screen">
            <h2>第一關：醣源啟動</h2>
            <p>移動底端核心收集 <span style="color:var(--energy-red)">紅色醣分子</span></p>
            <canvas id="game-canvas"></canvas>
            <p>分數: <span id="score1">0</span> / 10</p>
        </div>

        <!-- 第二關：事業辨識 (是非題) -->
        <div id="screen-lv2" class="level-screen">
            <h2>第二關：事業辨識</h2>
            <p>永豐餘旗下有做這些嗎？(限時3秒)</p>
            <div class="timer-bar-bg"><div id="timer-fill"></div></div>
            <div id="biz-item-text" class="biz-card">載入中...</div>
            <div class="binary-choice">
                <button class="btn-yes" onclick="handleBinary(true)">是</button>
                <button class="btn-no" onclick="handleBinary(false)">不是</button>
            </div>
            <p style="margin-top:20px">進度: <span id="lv2-progress">0</span> / 3</p>
        </div>

        <!-- 第三關：AI 紅色大腦 -->
        <div id="screen-lv3" class="level-screen">
            <h2>第三關：AI 紅色決策</h2>
            <p id="quiz-question">讀取中...</p>
            <div class="choice-container" id="quiz-options"></div>
        </div>

        <!-- 結束頁 -->
        <div id="screen-result" class="level-screen">
            <h1 style="color:var(--bright-orange)">MISSION COMPLETE</h1>
            <p id="ui-result-text">你的轉型能量值破表！<br>獲得『紅色先鋒』稱號。</p>
            <button class="btn-action" onclick="goToSurvey()">[ 填寫問卷領取獎勵 ]</button>
        </div>

    </div>

    <script>
        /************************************************
         * 設定區
         ************************************************/
        const GAME_CONFIG = {
            intro: "2分鐘挑戰 AI 永續之王。",
            surveyUrl: "https://www.surveycake.com/s/OYYdG",
            // 第二關是非題設定
            binaryQuiz: [
                { text: "五月花衛生紙", isTrue: true },
                { text: "只有傳統造紙", isTrue: false },
                { text: "永續能源發電", isTrue: true }
            ],
            // 第三關問答設定
            quiz: [
                {
                    question: "永豐餘綠色發電，請問是以下何者？",
                    options: [
                        { text: "沼氣發電", correct: true },
                        { text: "水力發電", correct: false },
                        { text: "風力發電", correct: false }
                    ]
                },
                {
                    question: "ESG 永續發展中，最重要的核心是什麼？",
                    options: [
                        { text: "持續獲利", correct: false },
                        { text: "低碳轉型與社會責任", correct: true }
                    ]
                }
            ]
        };

        let currentBizIdx = 0;
        let lv2Score = 0;
        let timerInterval;
        let timeLeft = 3.0;
        let currentQuizIdx = 0;
        let isGameRunning = false;

        document.getElementById('ui-intro').innerHTML = GAME_CONFIG.intro;

        function showScreen(id) {
            document.querySelectorAll('.level-screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        function startGame() {
            showScreen('screen-lv1');
            initLv1();
        }

        function goToSurvey() {
            window.location.href = GAME_CONFIG.surveyUrl;
        }

        // --- 第一關邏輯 ---
        function initLv1() {
            const canvas = document.getElementById('game-canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = window.innerWidth * 0.8;
            canvas.height = 300;
            let playerX = canvas.width / 2;
            let items = [];
            let score1 = 0;
            isGameRunning = true;

            const moveHandler = (e) => {
                const rect = canvas.getBoundingClientRect();
                const clientX = e.touches ? e.touches[0].clientX : e.clientX;
                playerX = clientX - rect.left;
            };
            canvas.addEventListener('touchmove', moveHandler);
            canvas.addEventListener('mousemove', moveHandler);

            function update() {
                if(!isGameRunning) return;
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = '#FF0000';
                ctx.fillRect(playerX - 25, canvas.height - 20, 50, 10);

                if(Math.random() < 0.05) {
                    items.push({ x: Math.random() * canvas.width, y: 0, type: Math.random() > 0.3 ? 'red' : 'gray' });
                }

                items.forEach((item, index) => {
                    item.y += 4;
                    ctx.fillStyle = item.type === 'red' ? '#FF0000' : '#666';
                    ctx.beginPath(); ctx.arc(item.x, item.y, 10, 0, Math.PI*2); ctx.fill();

                    if(item.y > canvas.height - 25 && Math.abs(item.x - playerX) < 30) {
                        if(item.type === 'red') {
                            score1++;
                            document.getElementById('score1').innerText = score1;
                        }
                        items.splice(index, 1);
                    }
                    if(item.y > canvas.height) items.splice(index, 1);
                });

                if(score1 >= 10) {
                    isGameRunning = false;
                    showScreen('screen-lv2');
                    initLv2();
                } else {
                    requestAnimationFrame(update);
                }
            }
            update();
        }

        // --- 第二關邏輯 (是非題) ---
        function initLv2() {
            if (currentBizIdx >= GAME_CONFIG.binaryQuiz.length) {
                showScreen('screen-lv3');
                initLv3();
                return;
            }
            
            timeLeft = 3.0;
            document.getElementById('lv2-progress').innerText = currentBizIdx;
            document.getElementById('biz-item-text').innerText = GAME_CONFIG.binaryQuiz[currentBizIdx].text;
            document.getElementById('timer-fill').style.width = '100%';
            
            clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                timeLeft -= 0.1;
                document.getElementById('timer-fill').style.width = (timeLeft / 3.0 * 100) + '%';
                if (timeLeft <= 0) {
                    clearInterval(timerInterval);
                    alert("超時了！再試一次。");
                    resetLv2();
                }
            }, 100);
        }

        function handleBinary(userChoice) {
            clearInterval(timerInterval);
            const correctAnswer = GAME_CONFIG.binaryQuiz[currentBizIdx].isTrue;
            
            if (userChoice === correctAnswer) {
                currentBizIdx++;
                initLv2();
            } else {
                alert("答錯囉！重新挑戰這一關。");
                resetLv2();
            }
        }

        function resetLv2() {
            currentBizIdx = 0;
            initLv2();
        }

        // --- 第三關邏輯 ---
        function initLv3() {
            const q = GAME_CONFIG.quiz[currentQuizIdx];
            document.getElementById('quiz-question').innerText = q.question;
            const container = document.getElementById('quiz-options');
            container.innerHTML = '';
            
            q.options.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = 'choice-btn';
                btn.innerText = opt.text;
                btn.onclick = () => {
                    if(opt.correct) {
                        currentQuizIdx++;
                        if(currentQuizIdx >= GAME_CONFIG.quiz.length) {
                            showScreen('screen-result');
                        } else {
                            initLv3();
                        }
                    } else {
                        alert("再思考看看最好的轉型方案！");
                    }
                };
                container.appendChild(btn);
            });
        }
    </script>
</body>
</html>
